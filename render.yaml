services:
  - type: web
    name: gproa-bimia
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    region: oregon
    buildCommand: docker build -t gproa-bimia .
    startCommand: uvicicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: EMERGENT_LLM_KEY
        sync: false
      - key: DB_NAME
        value: gproa_bimia
      - key: CORS_ORIGINS
        value: "*"